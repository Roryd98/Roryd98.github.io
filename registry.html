<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registry | Jemma &amp; Rory</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --blush:#A85A68; --blush-pale:#F4EFEA; --rose:#9B8B6B; --ivory:#FFFCF9; --mid:#6B6B6B; --dark:#2D2D2D; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Jost',sans-serif;background:var(--ivory);color:var(--dark)}
  nav{position:sticky;top:0;z-index:100;display:flex;justify-content:center;gap:1.2rem;flex-wrap:wrap;padding:1rem;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.12)}
  nav a{text-decoration:none;color:var(--mid);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase}
  nav a.active{color:var(--blush)}
  main{max-width:840px;margin:0 auto;padding:3rem 1.2rem 4rem}
  .section-label{font-size:.6rem;letter-spacing:.32em;text-transform:uppercase;color:var(--blush);display:block;margin-bottom:.8rem;text-align:center}
  .section-title{text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,3.2rem);font-style:italic;font-weight:300;color:var(--rose);margin-bottom:1.3rem}
  .ornament{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}.ornament-line{flex:1;height:1px;background:var(--blush)}.ornament-diamond{width:8px;height:8px;background:var(--blush);transform:rotate(45deg)}
  .poem{background:#fff;border:1px solid var(--blush-pale);padding:2rem;border-radius:4px;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem;line-height:1.8;color:var(--rose)}
  @media (max-width:560px){.poem{font-size:1.08rem;padding:1.4rem;line-height:1.72}}
</style>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="venue.html">Venue</a>
  <a href="menu.html">Menu</a>
  <a href="timeline.html">Timeline</a>
  <a href="rsvp.html">RSVP</a>
  <a href="registry.html" class="active">Registry</a>
</nav>
<main>
  <span class="section-label">With Love</span>
  <h1 class="section-title">Registry</h1>
  <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
  <div class="poem">
    We're blessed to have a home to share,<br>
    Filled with love, and all with care.<br>
    So if a gift is on your mind,<br>
    A little honeymoon fund would be kind.<br>
    To help us make some memories new,<br>
    As we begin our life as two.
  </div>
</main>
</body>
</html>
